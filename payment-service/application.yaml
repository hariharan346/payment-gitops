apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: payment-service
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hariharan346/payment-gitops.git
    targetRevision: HEAD
    path: payment-service

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true