apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:

      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: payment-service

        image: 660201001952.dkr.ecr.us-east-1.amazonaws.com/payment-service:v1

        ports:
        - containerPort: 8000